<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Actor–critic in the basal ganglia</text><rect x="50" y="80" width="600" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="350" y="105" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Cortex  (state representation)</text><line x1="220" y1="120" x2="220" y2="165" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="480" y1="120" x2="480" y2="165" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="120" y="165" width="200" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="220" y="185" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Actor</text><text x="220" y="202" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">dorsolateral striatum</text><text x="220" y="215" font-size="9" text-anchor="middle" fill="#4a4540">(selects actions)</text><rect x="380" y="165" width="200" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="480" y="185" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Critic</text><text x="480" y="202" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">striosomes / VTA inputs</text><text x="480" y="215" font-size="9" text-anchor="middle" fill="#4a4540">(supplies V(s_t))</text><line x1="480" y1="215" x2="480" y2="250" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="380" y="250" width="200" height="40" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="480" y="268" font-size="11" text-anchor="middle" font-weight="bold" fill="#f5f2ee">Dopamine neurons</text><text x="480" y="282" font-size="10" text-anchor="middle" font-style="italic" fill="#f5f2ee">compute δ_t</text><path d="M 380 270 Q 280 320, 220 215" fill="none" stroke="#1a1714" stroke-width="2"/><line x1="222" y1="217" x2="220" y2="215" stroke="#1a1714" stroke-width="2" marker-end="url(#arrow)"/><text x="280" y="320" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">δ_t  (plasticity gate)</text><text x="350" y="350" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">δ_t  trains both critic's V estimate AND actor's action selection — same signal, different uses.</text></svg>