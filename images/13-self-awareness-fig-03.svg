<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Clinical dissociations — body-self decomposes into independent components</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Mirrored self-misidentification</text><rect x="70" y="90" width="220" height="40" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="180" y="112" font-size="11" text-anchor="middle" font-weight="bold" fill="#f5f2ee">visual–kinesthetic match</text><text x="270" y="112" font-size="14" text-anchor="middle" font-weight="bold" fill="#f5f2ee">✗</text><rect x="70" y="140" width="220" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="162" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">social self</text><text x="270" y="162" font-size="14" text-anchor="middle" font-weight="bold" fill="#1a1714">✓</text><rect x="70" y="190" width="220" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="212" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">agency</text><text x="270" y="212" font-size="14" text-anchor="middle" font-weight="bold" fill="#1a1714">✓</text><text x="180" y="260" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">patient sees own reflection as a stranger;</text><text x="180" y="274" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540"> recognizes the body, but not as theirs</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Alien hand syndrome</text><rect x="410" y="90" width="220" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="520" y="112" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">visual–kinesthetic match</text><text x="610" y="112" font-size="14" text-anchor="middle" font-weight="bold" fill="#1a1714">✓</text><rect x="410" y="140" width="220" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="520" y="162" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">ownership</text><text x="610" y="162" font-size="14" text-anchor="middle" font-weight="bold" fill="#1a1714">✓</text><rect x="410" y="190" width="220" height="40" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="520" y="212" font-size="11" text-anchor="middle" font-weight="bold" fill="#f5f2ee">agency</text><text x="610" y="212" font-size="14" text-anchor="middle" font-weight="bold" fill="#f5f2ee">✗</text><text x="520" y="260" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">hand acts on its own;</text><text x="520" y="274" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540"> patient owns the hand, denies agency</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Different lesions damage different sub-components — body-self is not a single faculty.</text></svg>