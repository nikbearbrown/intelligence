<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Hippocampal replay — forward (planning) and reverse (credit)</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Forward replay  (at choice point)</text><rect x="70" y="80" width="220" height="140" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><line x1="110" y1="200" x2="250" y2="200" stroke="#1a1714" stroke-width="2"/><line x1="180" y1="100" x2="180" y2="200" stroke="#1a1714" stroke-width="2"/><circle cx="180" cy="200" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="180" y="214" font-size="9" text-anchor="middle" fill="#4a4540">rat (junction)</text><circle cx="170" cy="200" r="3" fill="#1a1714" stroke="#1a1714" stroke-width="0.5"/><circle cx="150" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="130" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="110" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><line x1="172" y1="195" x2="115" y2="195" stroke="#4a4540" stroke-width="1" marker-end="url(#arrow)"/><text x="145" y="185" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">place-cell sequence</text><text x="180" y="250" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">during sharp-wave ripple</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Reverse replay  (at reward)</text><rect x="410" y="80" width="220" height="140" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><line x1="450" y1="200" x2="590" y2="200" stroke="#1a1714" stroke-width="2"/><line x1="520" y1="100" x2="520" y2="200" stroke="#1a1714" stroke-width="2"/><circle cx="450" cy="200" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="450" y="214" font-size="9" text-anchor="middle" fill="#4a4540">rat (reward)</text><circle cx="470" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="490" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="510" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="520" cy="200" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="520" cy="180" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="520" cy="150" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><circle cx="520" cy="120" r="3" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.5"/><line x1="455" y1="195" x2="525" y2="195" stroke="#4a4540" stroke-width="1" marker-end="url(#arrow)"/><line x1="525" y1="195" x2="525" y2="125" stroke="#4a4540" stroke-width="1" marker-end="url(#arrow)"/><text x="490" y="185" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">reverse sequence</text><text x="520" y="95" font-size="9" text-anchor="middle" fill="#4a4540">(start)</text><text x="520" y="250" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">during sharp-wave ripple</text><text x="350" y="310" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Forward replay simulates a future trajectory. Reverse replay credits a recent path.</text><text x="350" y="326" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Same hippocampal hardware — opposite arrows of time.</text></svg>