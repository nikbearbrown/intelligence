<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Caenorhabditis elegans — anatomical landmarks</text><path d="M 80 200 Q 200 170, 350 200 Q 500 230, 620 200 Q 500 180, 350 200 Q 200 220, 80 200 Z" fill="#f5f2ee" stroke="#1a1714" stroke-width="1.2"/><ellipse cx="110" cy="200" rx="22" ry="8" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="110" y="175" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">pharynx</text><text x="110" y="188" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(anterior)</text><line x1="110" y1="192" x2="110" y2="195" stroke="#1a1714" stroke-width="1"/><line x1="140" y1="200" x2="560" y2="200" stroke="#4a4540" stroke-width="0.8" stroke-dasharray="4,2"/><text x="350" y="232" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">intestine (runs along midline)</text><path d="M 400 200 Q 430 180, 460 200 Q 430 220, 400 200 Z" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><path d="M 470 200 Q 500 180, 530 200 Q 500 220, 470 200 Z" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><text x="490" y="175" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">gonads</text><text x="610" y="192" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">tail</text><line x1="540" y1="290" x2="620" y2="290" stroke="#1a1714" stroke-width="2.5"/><text x="580" y="305" font-size="10" text-anchor="middle" fill="#1a1714">1 mm</text><text x="350" y="270" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Transparent under stereo microscope; entire anatomy visible without sectioning.</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">302 neurons, complete connectome (White et al. 1986). The book's central organism.</text></svg>