<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Temporal-difference error — local computation across two time steps</text><text x="350" y="90" font-size="18" text-anchor="middle" font-weight="bold" fill="#1a1714">δ_t  =  r_{t+1}  +  γV(s_{t+1})  −  V(s_t)</text><line x1="215" y1="100" x2="215" y2="130" stroke="#1a1714" stroke-width="0.8"/><text x="215" y="145" font-size="10" text-anchor="middle" fill="#4a4540">the prediction error</text><text x="215" y="159" font-size="10" text-anchor="middle" fill="#4a4540">(broadcast as dopamine)</text><line x1="290" y1="100" x2="290" y2="130" stroke="#1a1714" stroke-width="0.8"/><text x="290" y="145" font-size="10" text-anchor="middle" fill="#4a4540">actual reward</text><text x="290" y="159" font-size="10" text-anchor="middle" fill="#4a4540">received</text><line x1="370" y1="100" x2="370" y2="130" stroke="#1a1714" stroke-width="0.8"/><text x="370" y="145" font-size="10" text-anchor="middle" fill="#4a4540">discounted estimate</text><text x="370" y="159" font-size="10" text-anchor="middle" fill="#4a4540">of what comes next</text><line x1="480" y1="100" x2="480" y2="130" stroke="#1a1714" stroke-width="0.8"/><text x="480" y="145" font-size="10" text-anchor="middle" fill="#4a4540">current estimate</text><text x="480" y="159" font-size="10" text-anchor="middle" fill="#4a4540">being updated</text><line x1="120" y1="240" x2="580" y2="240" stroke="#1a1714" stroke-width="1.5"/><line x1="140" y1="235" x2="140" y2="245" stroke="#1a1714" stroke-width="1"/><text x="140" y="260" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">t</text><line x1="350" y1="235" x2="350" y2="245" stroke="#1a1714" stroke-width="1"/><text x="350" y="260" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">t+1</text><line x1="560" y1="235" x2="560" y2="245" stroke="#1a1714" stroke-width="1"/><text x="560" y="260" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">t+2</text><text x="350" y="290" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Update at time t uses information from t+1. Local — no need to remember long histories.</text><text x="350" y="308" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Computed in dopamine neurons; broadcast as a global plasticity gate to striatum.</text></svg>