<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Venus flytrap — leaky calcium integrator counts trigger touches</text><line x1="90" y1="290" x2="610" y2="290" stroke="#8a8480" stroke-width="1"/><line x1="90" y1="70" x2="90" y2="300" stroke="#8a8480" stroke-width="1"/><text x="40" y="180" font-size="11" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">[Ca²⁺]ᵢ</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">First touch triggers a Ca²⁺ spike that decays. Second touch within ~20 s adds to the residual — and crosses threshold.</text><text x="350" y="320" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">time (s)</text><line x1="90" y1="110" x2="610" y2="110" stroke="#1a1714" stroke-width="0.8" stroke-dasharray="4,3"/><text x="614" y="114" font-size="9" font-style="italic" fill="#1a1714">threshold</text><path d="M 90 290 L 140 290 L 150 200 Q 180 280, 240 260" fill="none" stroke="#1a1714" stroke-width="2"/><path d="M 240 260 Q 290 275, 350 268" fill="none" stroke="#1a1714" stroke-width="2"/><path d="M 350 268 L 360 100 Q 400 250, 450 280" fill="none" stroke="#1a1714" stroke-width="2"/><path d="M 450 280 Q 540 287, 610 289" fill="none" stroke="#1a1714" stroke-width="2"/><line x1="145" y1="286" x2="145" y2="298" stroke="#1a1714" stroke-width="1.5"/><text x="145" y="312" font-size="9" text-anchor="middle" font-weight="bold" fill="#1a1714">touch 1</text><line x1="355" y1="286" x2="355" y2="298" stroke="#1a1714" stroke-width="1.5"/><text x="355" y="312" font-size="9" text-anchor="middle" font-weight="bold" fill="#1a1714">touch 2</text></svg>