<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Inverse reinforcement learning as theory of mind</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Observed behavior</text><rect x="60" y="90" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="108" font-size="10" text-anchor="middle" fill="#1a1714">walks toward kitchen</text><rect x="60" y="130" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="148" font-size="10" text-anchor="middle" fill="#1a1714">opens refrigerator</text><rect x="60" y="170" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="188" font-size="10" text-anchor="middle" fill="#1a1714">scans interior</text><line x1="305" y1="130" x2="395" y2="130" stroke="#1a1714" stroke-width="2" marker-end="url(#arrow)"/><text x="350" y="122" font-size="11" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">IRL inference</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Inferred latent variables</text><rect x="400" y="90" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="440" y="108" font-size="10" font-weight="bold" fill="#1a1714">desire:</text><text x="620" y="108" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">food</text><rect x="400" y="130" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="440" y="148" font-size="10" font-weight="bold" fill="#1a1714">belief:</text><text x="620" y="148" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">food is here</text><rect x="400" y="170" width="240" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="440" y="188" font-size="10" font-weight="bold" fill="#1a1714">intention:</text><text x="620" y="188" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">eat</text><line x1="520" y1="215" x2="520" y2="250" stroke="#1a1714" stroke-width="2" marker-end="url(#arrow)"/><text x="540" y="235" font-size="10" font-weight="bold" font-style="italic" fill="#1a1714">generalizes to novel situations</text><text x="520" y="280" font-size="10" text-anchor="middle" fill="#4a4540">predicts behavior in cases never observed</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">The compact mental-state representation is the compression that makes social prediction tractable.</text></svg>