<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Individual creativity vs. cumulative culture — two distinct loops</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Individual creativity</text><rect x="130" y="86" width="100" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="104" font-size="10" text-anchor="middle" fill="#1a1714">novel behavior</text><rect x="210" y="161" width="100" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="260" y="179" font-size="10" text-anchor="middle" fill="#1a1714">evaluate</text><rect x="130" y="236" width="100" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="254" font-size="10" text-anchor="middle" fill="#1a1714">may spread</text><rect x="50" y="161" width="100" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="100" y="179" font-size="10" text-anchor="middle" fill="#1a1714">loop ends</text><line x1="180" y1="114" x2="180" y2="154" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 230 100 Q 270 175, 230 250" fill="none" stroke="#1a1714" stroke-width="1" stroke-dasharray="3,2"/><path d="M 130 100 Q 90 175, 130 250" fill="none" stroke="#1a1714" stroke-width="1" stroke-dasharray="3,2"/><text x="180" y="285" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(no ratchet)</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Cumulative culture (the ratchet)</text><rect x="370" y="96" width="120" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="430" y="114" font-size="10" text-anchor="middle" fill="#1a1714">innovation</text><rect x="550" y="96" width="120" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="610" y="114" font-size="10" text-anchor="middle" fill="#1a1714">transmission</text><rect x="550" y="206" width="120" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="610" y="224" font-size="10" text-anchor="middle" fill="#1a1714">next gen inherits</text><rect x="370" y="206" width="120" height="28" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="430" y="224" font-size="10" text-anchor="middle" fill="#1a1714">extends + refines</text><line x1="490" y1="110" x2="549" y2="110" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="610" y1="124" x2="610" y2="206" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="550" y1="220" x2="491" y2="220" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="206" x2="430" y2="124" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="234" x2="430" y2="290" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="440" y="270" font-size="10" font-weight="bold" font-style="italic" fill="#1a1714">+1 every cycle</text><text x="520" y="305" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">knowledge accumulates</text><text x="350" y="340" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Left: ends with the individual. Right: each generation begins where the last left off.</text></svg>