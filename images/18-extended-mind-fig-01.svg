<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="420" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Extension asymmetry — capacity extended, direction retained</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Pearl Rung 1 — capacities tools have extended</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Pearl Rungs 2–3 — direction the human keeps</text><rect x="50" y="100" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="119" font-size="10" text-anchor="middle" fill="#1a1714">gradient sensing</text><line x1="310" y1="115" x2="390" y2="115" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="100" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="119" font-size="10" text-anchor="middle" fill="#1a1714">choosing what to measure</text><rect x="50" y="140" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="159" font-size="10" text-anchor="middle" fill="#1a1714">steering / navigation</text><line x1="310" y1="155" x2="390" y2="155" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="140" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="159" font-size="10" text-anchor="middle" fill="#1a1714">deciding the destination</text><rect x="50" y="180" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="199" font-size="10" text-anchor="middle" fill="#1a1714">pattern recognition</text><line x1="310" y1="195" x2="390" y2="195" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="180" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="199" font-size="10" text-anchor="middle" fill="#1a1714">framing the question</text><rect x="50" y="220" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="239" font-size="10" text-anchor="middle" fill="#1a1714">memory / retrieval</text><line x1="310" y1="235" x2="390" y2="235" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="220" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="239" font-size="10" text-anchor="middle" fill="#1a1714">judging what is worth remembering</text><rect x="50" y="260" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="279" font-size="10" text-anchor="middle" fill="#1a1714">prediction</text><line x1="310" y1="275" x2="390" y2="275" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="260" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="279" font-size="10" text-anchor="middle" fill="#1a1714">selecting the counterfactual</text><rect x="50" y="300" width="260" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="319" font-size="10" text-anchor="middle" fill="#1a1714">language production</text><line x1="310" y1="315" x2="390" y2="315" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><rect x="390" y="300" width="260" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="319" font-size="10" text-anchor="middle" fill="#1a1714">auditing for plausibility + accountability</text><text x="350" y="360" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Right column does not shrink as tools improve — it grows.</text><text x="350" y="378" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Every tool in the catalog extends a Rung-1 capacity and leaves Rungs 2–3 to the human.</text><text x="350" y="394" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">AI is the next entry in this catalog — not a replacement for the directing layer.</text></svg>