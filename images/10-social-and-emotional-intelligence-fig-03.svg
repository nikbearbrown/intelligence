<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Von Economo neurons — independent appearance in three lineages</text><circle cx="80" cy="200" r="10" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="80" y="230" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">common
mammalian
ancestor</text><line x1="80" y1="200" x2="340" y2="100" stroke="#1a1714" stroke-width="1"/><line x1="80" y1="200" x2="340" y2="200" stroke="#1a1714" stroke-width="1"/><line x1="80" y1="200" x2="340" y2="300" stroke="#1a1714" stroke-width="1"/><rect x="340" y="75" width="280" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="360" y="93" font-size="12" font-weight="bold" fill="#1a1714">Primates</text><text x="360" y="109" font-size="10" font-style="italic" fill="#1a1714">Von Economo neurons in: ACC + frontoinsular</text><text x="360" y="123" font-size="9" font-style="italic" fill="#4a4540">appeared independently ~5 Mya (great apes)</text><rect x="340" y="175" width="280" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="360" y="193" font-size="12" font-weight="bold" fill="#1a1714">Cetaceans</text><text x="360" y="209" font-size="10" font-style="italic" fill="#1a1714">Von Economo neurons in: ACC + frontoinsular</text><text x="360" y="223" font-size="9" font-style="italic" fill="#4a4540">appeared independently ~30 Mya</text><rect x="340" y="275" width="280" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="360" y="293" font-size="12" font-weight="bold" fill="#1a1714">Elephants</text><text x="360" y="309" font-size="10" font-style="italic" fill="#1a1714">Von Economo neurons in: ACC + frontoinsular</text><text x="360" y="323" font-size="9" font-style="italic" fill="#4a4540">appeared independently ~50 Mya</text><text x="350" y="340" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Same cell type. Same cortical region. Three independent evolutionary origins. The substrate convergent.</text></svg>