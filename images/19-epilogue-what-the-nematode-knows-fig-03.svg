<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="480" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Scala naturae vs. the actual map</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Scala naturae  (the ladder)</text><line x1="180" y1="80" x2="180" y2="380" stroke="#1a1714" stroke-width="2"/><line x1="160" y1="90" x2="200" y2="90" stroke="#1a1714" stroke-width="2"/><text x="220" y="94" font-size="11" font-weight="bold" fill="#1a1714">Human</text><circle cx="180" cy="90" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="130" x2="200" y2="130" stroke="#1a1714" stroke-width="2"/><text x="220" y="134" font-size="11" font-weight="bold" fill="#1a1714">Chimpanzee</text><circle cx="180" cy="130" r="5" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="170" x2="200" y2="170" stroke="#1a1714" stroke-width="2"/><text x="220" y="174" font-size="11" font-weight="bold" fill="#1a1714">Dolphin</text><circle cx="180" cy="170" r="5" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="210" x2="200" y2="210" stroke="#1a1714" stroke-width="2"/><text x="220" y="214" font-size="11" font-weight="bold" fill="#1a1714">Crow</text><circle cx="180" cy="210" r="5" fill="#8a8480" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="250" x2="200" y2="250" stroke="#1a1714" stroke-width="2"/><text x="220" y="254" font-size="11" font-weight="bold" fill="#1a1714">Bee</text><circle cx="180" cy="250" r="5" fill="#8a8480" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="290" x2="200" y2="290" stroke="#1a1714" stroke-width="2"/><text x="220" y="294" font-size="11" font-weight="bold" fill="#1a1714">Fish</text><circle cx="180" cy="290" r="5" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="330" x2="200" y2="330" stroke="#1a1714" stroke-width="2"/><text x="220" y="334" font-size="11" font-weight="bold" fill="#1a1714">Worm</text><circle cx="180" cy="330" r="5" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><line x1="160" y1="370" x2="200" y2="370" stroke="#1a1714" stroke-width="2"/><text x="220" y="374" font-size="11" font-weight="bold" fill="#1a1714">Bacterium</text><circle cx="180" cy="370" r="5" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="180" y="410" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">single axis, ranked</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">The actual map  (multi-axis)</text><rect x="390" y="80" width="260" height="320" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><line x1="390" y1="380" x2="650" y2="380" stroke="#8a8480" stroke-width="1"/><line x1="390" y1="80" x2="390" y2="380" stroke="#8a8480" stroke-width="1"/><text x="520" y="395" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">social cognition →</text><text x="380" y="240" font-size="10" text-anchor="end" font-style="italic" fill="#4a4540">pattern recog. →</text><circle cx="425" cy="110" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="434" y="113" font-size="10" fill="#1a1714">human</text><circle cx="590" cy="130" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="599" y="133" font-size="10" fill="#1a1714">chimp</text><circle cx="470" cy="160" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="479" y="163" font-size="10" fill="#1a1714">dolphin</text><circle cx="610" cy="270" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="619" y="273" font-size="10" fill="#1a1714">crow</text><circle cx="510" cy="290" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="519" y="293" font-size="10" fill="#1a1714">bee</text><circle cx="560" cy="350" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="569" y="353" font-size="10" fill="#1a1714">archerfish</text><circle cx="430" cy="360" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="439" y="363" font-size="10" fill="#1a1714">worm</text><circle cx="440" cy="200" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="449" y="203" font-size="10" fill="#1a1714">octopus</text><text x="520" y="425" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">each species occupies a region defined by its profile</text><text x="520" y="442" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">no axis ranks them all</text><text x="350" y="470" font-size="10" text-anchor="middle" font-weight="bold" font-style="italic" fill="#4a4540">The ladder is the picture from a single axis.  The map is the data.</text></svg>