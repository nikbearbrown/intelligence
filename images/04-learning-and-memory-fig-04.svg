<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Rescorla–Wagner — learning tracks the residual prediction error</text><text x="130" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Phase 1: A → reward</text><line x1="60" y1="250" x2="220" y2="250" stroke="#8a8480" stroke-width="1"/><line x1="60" y1="90" x2="60" y2="250" stroke="#8a8480" stroke-width="1"/><text x="140.0" y="268" font-size="9" text-anchor="middle" fill="#4a4540">trials →</text><text x="52" y="92" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">V</text><text x="52" y="254" font-size="10" text-anchor="end" fill="#1a1714">0</text><line x1="60" y1="100" x2="220" y2="100" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><text x="224" y="102" font-size="9" font-style="italic" fill="#4a4540">λ</text><path d="M 60 250 Q 110 160, 220 105" fill="none" stroke="#1a1714" stroke-width="1.8"/><text x="140.0" y="130" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">V_A → λ</text><text x="350" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Phase 2: A+B → reward (B blocked)</text><line x1="280" y1="250" x2="440" y2="250" stroke="#8a8480" stroke-width="1"/><line x1="280" y1="90" x2="280" y2="250" stroke="#8a8480" stroke-width="1"/><text x="360.0" y="268" font-size="9" text-anchor="middle" fill="#4a4540">trials →</text><text x="272" y="92" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">V</text><text x="272" y="254" font-size="10" text-anchor="end" fill="#1a1714">0</text><line x1="280" y1="100" x2="440" y2="100" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><text x="444" y="102" font-size="9" font-style="italic" fill="#4a4540">λ</text><line x1="280" y1="100" x2="440" y2="100" stroke="#1a1714" stroke-width="1.8"/><text x="360.0" y="95" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">V_A</text><line x1="280" y1="250" x2="440" y2="245" stroke="#1a1714" stroke-width="1.8" stroke-dasharray="4,3"/><text x="360.0" y="234" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">V_B (blocked)</text><text x="570" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Phase 3: B alone → reward</text><line x1="500" y1="250" x2="660" y2="250" stroke="#8a8480" stroke-width="1"/><line x1="500" y1="90" x2="500" y2="250" stroke="#8a8480" stroke-width="1"/><text x="580.0" y="268" font-size="9" text-anchor="middle" fill="#4a4540">trials →</text><text x="492" y="92" font-size="10" text-anchor="end" font-style="italic" fill="#1a1714">V</text><text x="492" y="254" font-size="10" text-anchor="end" fill="#1a1714">0</text><line x1="500" y1="100" x2="660" y2="100" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><text x="664" y="102" font-size="9" font-style="italic" fill="#4a4540">λ</text><path d="M 500 250 Q 550 160, 660 105" fill="none" stroke="#1a1714" stroke-width="1.8"/><text x="580.0" y="130" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">V_B → λ</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">When λ − ΣV ≈ 0 (phase 2), there is no error to drive new learning. B's failure to gain value is the diagnostic.</text></svg>