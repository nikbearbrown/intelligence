<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Three concentric subsystems of the self</text><circle cx="350" cy="195" r="130" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><circle cx="350" cy="195" r="90" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><circle cx="350" cy="195" r="50" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="350" y="191" font-size="12" text-anchor="middle" font-weight="bold" fill="#f5f2ee">Body self</text><text x="350" y="207" font-size="10" text-anchor="middle" font-style="italic" fill="#f5f2ee">(mirror test)</text><text x="350" y="125" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Social self</text><text x="350" y="139" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(recognition by others)</text><text x="350" y="85" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Narrative self</text><text x="350" y="99" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(continuity over time)</text><text x="560" y="110" font-size="10" font-weight="bold" fill="#1a1714">Chimpanzee</text><text x="560" y="124" font-size="10" font-style="italic" fill="#4a4540">✓ ✓ ✓</text><text x="560" y="175" font-size="10" font-weight="bold" fill="#1a1714">Magpie</text><text x="560" y="189" font-size="10" font-style="italic" fill="#4a4540">✓ partial ✗</text><text x="560" y="240" font-size="10" font-weight="bold" fill="#1a1714">Cleaner wrasse</text><text x="560" y="254" font-size="10" font-style="italic" fill="#4a4540">✓ ? ✗</text><text x="350" y="340" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">The mirror test probes one ring — the innermost.</text></svg>