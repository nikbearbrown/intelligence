<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Hare paradigm vs. Sally-Anne — what each test isolates</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Hare paradigm</text><text x="180" y="76" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">perceptual perspective-taking</text><rect x="60" y="95" width="240" height="130" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><circle cx="95" cy="130" r="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><text x="95" y="134" font-size="10" text-anchor="middle" font-weight="bold" fill="#f5f2ee">D</text><circle cx="265" cy="130" r="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="265" y="134" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">S</text><circle cx="160" cy="175" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="165" y="165" font-size="9" fill="#4a4540">food (visible)</text><circle cx="220" cy="175" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="195" y="200" font-size="9" fill="#4a4540">food (hidden)</text><line x1="195" y1="145" x2="195" y2="215" stroke="#1a1714" stroke-width="2"/><text x="180" y="240" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">barrier</text><text x="180" y="270" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Q: which pile does S take?</text><text x="180" y="285" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">A: the one D cannot see.</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Sally-Anne</text><text x="520" y="76" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">false-belief attribution</text><rect x="400" y="95" width="240" height="130" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><circle cx="440" cy="130" r="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><text x="440" y="134" font-size="9" text-anchor="middle" font-weight="bold" fill="#f5f2ee">Sa</text><text x="395" y="110" font-size="9" font-style="italic" fill="#4a4540">(absent)</text><circle cx="600" cy="130" r="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="600" y="134" font-size="9" text-anchor="middle" font-weight="bold" fill="#1a1714">An</text><rect x="450" y="175" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="465" y="215" font-size="9" text-anchor="middle" fill="#4a4540">basket</text><rect x="560" y="175" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="575" y="215" font-size="9" text-anchor="middle" fill="#4a4540">box</text><circle cx="575" cy="195" r="4" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="465" y="195" font-size="9" text-anchor="middle" fill="#1a1714">—</text><text x="520" y="270" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Q: where will Sally LOOK?</text><text x="520" y="285" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">A: basket — Sally's false belief.</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Hare tests what the OTHER can see right now. Sally-Anne tests what the OTHER believes despite reality.</text></svg>