<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">E. coli chemotaxis — fast signaling and slow methylation memory</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Fast signaling arm  (~100 ms)</text><rect x="60" y="90" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="107" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">MCP receptor</text><text x="180" y="122" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">binds attractant</text><rect x="60" y="200" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="217" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">CheA kinase</text><text x="180" y="232" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">autophosphorylates</text><rect x="60" y="290" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="307" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">CheY-P</text><text x="180" y="322" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">diffuses to motor</text><rect x="60" y="380" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="397" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Flagellar motor</text><text x="180" y="412" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">switches CW ↔ CCW</text><line x1="180" y1="130" x2="180" y2="140" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="180" y1="240" x2="180" y2="250" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="180" y1="330" x2="180" y2="340" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Slow memory arm  (~4 s)</text><rect x="400" y="90" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="107" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">CheR methylase</text><text x="520" y="122" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">adds methyl groups</text><rect x="400" y="200" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="217" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">MCP receptor</text><text x="520" y="232" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(activity ↑)</text><rect x="400" y="290" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="307" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">CheB demethylase</text><text x="520" y="322" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">removes methyls</text><rect x="400" y="380" width="240" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="397" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">MCP receptor</text><text x="520" y="412" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(activity ↓ to baseline)</text><line x1="520" y1="130" x2="520" y2="140" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="520" y1="240" x2="520" y2="250" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="520" y1="330" x2="520" y2="340" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/></svg>