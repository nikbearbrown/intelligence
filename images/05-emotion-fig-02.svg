<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">The cognitive-bias paradigm — training and test</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Training</text><rect x="60" y="80" width="240" height="80" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="100" font-size="10" text-anchor="middle" fill="#1a1714">CS+ (e.g. lemon odor)</text><line x1="245" y1="100" x2="270" y2="100" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="280" y="104" font-size="10" fill="#1a1714">→ reward</text><text x="180" y="130" font-size="10" text-anchor="middle" fill="#1a1714">CS− (e.g. pineapple odor)</text><line x1="245" y1="130" x2="270" y2="130" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="280" y="134" font-size="10" fill="#1a1714">→ aversive</text><text x="180" y="175" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Animal learns the contingency.</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Test</text><rect x="400" y="80" width="240" height="80" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="110" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Ambiguous stimulus</text><text x="520" y="128" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(midpoint between CS+ and CS−)</text><line x1="520" y1="165" x2="460" y2="220" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="390" y="220" width="150" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="465" y="240" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Negatively biased</text><text x="465" y="255" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">interprets as CS−</text><text x="465" y="268" font-size="9" text-anchor="middle" fill="#4a4540">(slow approach, withdrawal)</text><line x1="520" y1="165" x2="580" y2="220" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="510" y="220" width="150" height="50" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="585" y="240" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Positively biased</text><text x="585" y="255" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">interprets as CS+</text><text x="585" y="268" font-size="9" text-anchor="middle" fill="#4a4540">(fast approach)</text><text x="350" y="310" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">The paradigm requires a trained discrimination plus a deliberately ambiguous probe stimulus.</text></svg>