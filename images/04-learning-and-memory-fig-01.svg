<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="420" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Three forms of learning, in evolutionary order</text><rect x="80" y="340" width="540" height="70" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="110" y="358" font-size="12" font-weight="bold" fill="#1a1714">Habituation</text><text x="110" y="374" font-size="10" font-style="italic" fill="#4a4540">decreased response to repeated stimulus</text><text x="110" y="390" font-size="10" fill="#1a1714">substrate: neurons not required (slime mold)</text><text x="110" y="405" font-size="10" fill="#4a4540">exemplar: Physarum, C. elegans, Mimosa</text><rect x="80" y="240" width="540" height="70" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="110" y="258" font-size="12" font-weight="bold" fill="#1a1714">Sensitization</text><text x="110" y="274" font-size="10" font-style="italic" fill="#4a4540">increased response after a single salient event</text><text x="110" y="290" font-size="10" fill="#1a1714">substrate: single modulatory neuron sufficient</text><text x="110" y="305" font-size="10" fill="#4a4540">exemplar: Aplysia (Kandel)</text><rect x="80" y="140" width="540" height="70" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="110" y="158" font-size="12" font-weight="bold" fill="#1a1714">Associative learning</text><text x="110" y="174" font-size="10" font-style="italic" fill="#4a4540">form predictive link between stimuli</text><text x="110" y="190" font-size="10" fill="#1a1714">substrate: minimum: pre/post co-activation + a teaching signal</text><text x="110" y="205" font-size="10" fill="#4a4540">exemplar: Aplysia, Drosophila, Nematostella (2023)</text><line x1="50" y1="360" x2="50" y2="160" stroke="#1a1714" stroke-width="2" marker-end="url(#arrow)"/><text x="40" y="240" font-size="10" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">increasing evolutionary complexity</text><text x="35" y="250" font-size="8" text-anchor="middle" fill="#c8c4c0">(rotated)</text><text x="350" y="395" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Boundary moved in 2023 — Nematostella (sea anemone, no central brain) shows associative conditioning.</text></svg>