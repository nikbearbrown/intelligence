<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Goldfish recognition across rotations — DeLong et al.</text><line x1="90" y1="260" x2="630" y2="260" stroke="#8a8480" stroke-width="1"/><line x1="90" y1="80" x2="90" y2="260" stroke="#8a8480" stroke-width="1"/><rect x="90.0" y="94.4" width="100" height="165.6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="140" y="88.4" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">92%</text><text x="140" y="278" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">0°</text><rect x="220.0" y="125.0" width="100" height="135.0" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="270" y="119.0" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">75%</text><text x="270" y="278" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">90°</text><rect x="350.0" y="152.0" width="100" height="108.0" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="400" y="146.0" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">60%</text><text x="400" y="278" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">180°</text><rect x="480.0" y="119.6" width="100" height="140.4" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="530" y="113.6" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">78%</text><text x="530" y="278" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">270°</text><text x="35" y="180" font-size="11" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">Accuracy</text><text x="35" y="195" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">(%)</text><text x="350" y="300" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">rotation from training orientation</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Drop is asymmetric — not a smooth function of angle. The goldfish has invariance, but limited.</text><text x="350" y="336" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Compare archerfish: 81% on a 44-face recognition task (Newport et al.).</text></svg>