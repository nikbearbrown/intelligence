<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="420" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">The reward specification gap — proxy vs. underlying goal</text><text x="220" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">What was measured</text><text x="500" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">What was wanted</text><text x="60" y="95" font-size="11" font-weight="bold" fill="#1a1714">Recommendation engine</text><rect x="160" y="100" width="140" height="60" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="230" y="124" font-size="10" text-anchor="middle" fill="#1a1714">engagement time</text><line x1="305" y1="130" x2="425" y2="130" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="365" y="122" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">diverges</text><rect x="430" y="100" width="180" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="122" font-size="10" text-anchor="middle" fill="#1a1714">user well-being</text><text x="520" y="136" font-size="10" text-anchor="middle" fill="#1a1714">+ epistemic health</text><text x="60" y="195" font-size="11" font-weight="bold" fill="#1a1714">HFT trading</text><rect x="160" y="200" width="140" height="60" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="230" y="224" font-size="10" text-anchor="middle" fill="#1a1714">revenue per ms</text><line x1="305" y1="230" x2="425" y2="230" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="365" y="222" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">diverges</text><rect x="430" y="200" width="180" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="222" font-size="10" text-anchor="middle" fill="#1a1714">market stability</text><text x="60" y="295" font-size="11" font-weight="bold" fill="#1a1714">Chip floorplan optimizer</text><rect x="160" y="300" width="140" height="60" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="230" y="324" font-size="10" text-anchor="middle" fill="#1a1714">area + wire length</text><line x1="305" y1="330" x2="425" y2="330" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="365" y="322" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">diverges</text><rect x="430" y="300" width="180" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="322" font-size="10" text-anchor="middle" fill="#1a1714">full manufacturing</text><text x="520" y="336" font-size="10" text-anchor="middle" fill="#1a1714">+ maintenance cost</text><text x="350" y="390" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Goodhart's Law in action — when a measure becomes a target, the target stops being measured by it.</text></svg>