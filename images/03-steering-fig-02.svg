<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">C. elegans run-and-pirouette navigation up a chemical gradient</text><circle cx="600" cy="150" r="12" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="600" y="130" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">attractant source</text><circle cx="600" cy="150" r="60" fill="none" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><circle cx="600" cy="150" r="100" fill="none" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><circle cx="600" cy="150" r="140" fill="none" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><circle cx="600" cy="150" r="180" fill="none" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="3,3"/><line x1="80" y1="220" x2="130" y2="195" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><line x1="130" y1="195" x2="180" y2="200" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><line x1="180" y1="200" x2="190" y2="200" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><path d="M 190 200 q 6 -8 12 0 q 6 8 0 12 q -10 4 -8 -8 q 4 -4 8 0 L 235 175" fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="235" y1="175" x2="280" y2="185" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><line x1="280" y1="185" x2="290" y2="185" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><path d="M 290 185 q 6 -8 12 0 q 6 8 0 12 q -10 4 -8 -8 q 4 -4 8 0 L 340 160" fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="340" y1="160" x2="390" y2="175" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><line x1="390" y1="175" x2="400" y2="175" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><path d="M 400 175 q 6 -8 12 0 q 6 8 0 12 q -10 4 -8 -8 q 4 -4 8 0 L 445 150" fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="445" y1="150" x2="490" y2="165" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><line x1="490" y1="165" x2="500" y2="165" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><path d="M 500 165 q 6 -8 12 0 q 6 8 0 12 q -10 4 -8 -8 q 4 -4 8 0 L 545 145" fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="545" y1="145" x2="590" y2="150" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/><text x="105.0" y="197.5" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">+ dC/dt</text><text x="207.5" y="177.5" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">+ dC/dt</text><text x="257.5" y="170.0" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">− dC/dt → pirouette</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Each pirouette resets heading. Positive dC/dt suppresses pirouettes; negative dC/dt triggers them.</text></svg>