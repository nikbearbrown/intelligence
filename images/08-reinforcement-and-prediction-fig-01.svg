<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Schultz dopamine — the reward-prediction-error signature</text><text x="135" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Early training</text><text x="135" y="76" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">no cue burst, big reward burst</text><line x1="45" y1="280" x2="225" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="45" y1="110" x2="45" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="95" y1="276" x2="95" y2="288" stroke="#1a1714" stroke-width="1"/><text x="95" y="302" font-size="9" text-anchor="middle" fill="#4a4540">cue</text><line x1="175" y1="276" x2="175" y2="288" stroke="#1a1714" stroke-width="1"/><text x="175" y="302" font-size="9" text-anchor="middle" fill="#4a4540">reward</text><path d="M 45 250 L 95 250 L 173 250 L 174 130 L 180 130 L 185 250 L 225 250" fill="none" stroke="#1a1714" stroke-width="1.5"/><text x="350" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">After learning</text><text x="350" y="76" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">cue burst, no reward burst</text><line x1="260" y1="280" x2="440" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="260" y1="110" x2="260" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="310" y1="276" x2="310" y2="288" stroke="#1a1714" stroke-width="1"/><text x="310" y="302" font-size="9" text-anchor="middle" fill="#4a4540">cue</text><line x1="390" y1="276" x2="390" y2="288" stroke="#1a1714" stroke-width="1"/><text x="390" y="302" font-size="9" text-anchor="middle" fill="#4a4540">reward</text><path d="M 260 250 L 308 250 L 309 130 L 315 130 L 320 250 L 440 250" fill="none" stroke="#1a1714" stroke-width="1.5"/><text x="565" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Reward omission</text><text x="565" y="76" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">cue burst, dip below baseline</text><line x1="475" y1="280" x2="655" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="475" y1="110" x2="475" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="525" y1="276" x2="525" y2="288" stroke="#1a1714" stroke-width="1"/><text x="525" y="302" font-size="9" text-anchor="middle" fill="#4a4540">cue</text><line x1="605" y1="276" x2="605" y2="288" stroke="#1a1714" stroke-width="1"/><text x="605" y="302" font-size="9" text-anchor="middle" fill="#4a4540">reward</text><path d="M 475 250 L 523 250 L 524 130 L 530 130 L 535 250 L 603 250 L 604 295 L 610 295 L 615 250 L 655 250" fill="none" stroke="#1a1714" stroke-width="1.5"/><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">δ_t = r_{t+1} + γV(s_{t+1}) − V(s_t).  The dopamine spike IS prediction error.</text><text x="50" y="200" font-size="10" font-style="italic" fill="#4a4540">DA rate</text></svg>