<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Hippocampal + PFC activity during self-routing vs. GPS following</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Self-planned routing</text><line x1="80" y1="270" x2="280" y2="270" stroke="#8a8480" stroke-width="1"/><line x1="80" y1="90" x2="80" y2="270" stroke="#8a8480" stroke-width="1"/><text x="110" y="288" font-size="9" text-anchor="middle" fill="#4a4540">2 routes</text><text x="170" y="288" font-size="9" text-anchor="middle" fill="#4a4540">4 routes</text><text x="230" y="288" font-size="9" text-anchor="middle" fill="#4a4540">6 routes</text><rect x="94" y="210" width="14" height="60" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="112" y="222.0" width="14" height="48.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><rect x="154" y="170" width="14" height="100" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="172" y="190.0" width="14" height="80.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><rect x="214" y="130" width="14" height="140" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="232" y="158.0" width="14" height="112.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="80" y="70" font-size="10" font-style="italic" fill="#4a4540">BOLD activity</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">GPS instruction-following</text><line x1="420" y1="270" x2="620" y2="270" stroke="#8a8480" stroke-width="1"/><line x1="420" y1="90" x2="420" y2="270" stroke="#8a8480" stroke-width="1"/><text x="450" y="288" font-size="9" text-anchor="middle" fill="#4a4540">2 routes</text><text x="510" y="288" font-size="9" text-anchor="middle" fill="#4a4540">4 routes</text><text x="570" y="288" font-size="9" text-anchor="middle" fill="#4a4540">6 routes</text><rect x="434" y="245" width="14" height="25" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="452" y="250.0" width="14" height="20.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><rect x="494" y="242" width="14" height="28" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="512" y="247.6" width="14" height="22.400000000000002" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><rect x="554" y="240" width="14" height="30" fill="#c8c4c0" stroke="#1a1714" stroke-width="0.7"/><rect x="572" y="246.0" width="14" height="24.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="420" y="70" font-size="10" font-style="italic" fill="#4a4540">BOLD activity</text><rect x="280" y="305" width="14" height="12" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="298" y="315" font-size="9" fill="#4a4540">hippocampus</text><rect x="370" y="305" width="14" height="12" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="388" y="315" font-size="9" fill="#4a4540">prefrontal cortex</text><text x="350" y="340" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">GPS use suppresses route-complexity scaling — the system stops doing the work the route demanded.</text></svg>