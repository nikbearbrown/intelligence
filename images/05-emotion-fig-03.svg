<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Perry 2016 — approach latency to ambiguous cylinder, three groups</text><line x1="100" y1="290" x2="580" y2="290" stroke="#8a8480" stroke-width="1"/><line x1="100" y1="80" x2="100" y2="290" stroke="#8a8480" stroke-width="1"/><line x1="96" y1="80" x2="100" y2="80" stroke="#8a8480" stroke-width="1"/><text x="90" y="84" font-size="10" text-anchor="end" fill="#4a4540">60</text><line x1="96" y1="165" x2="100" y2="165" stroke="#8a8480" stroke-width="1"/><text x="90" y="169" font-size="10" text-anchor="end" fill="#4a4540">30</text><line x1="96" y1="290" x2="100" y2="290" stroke="#8a8480" stroke-width="1"/><text x="90" y="294" font-size="10" text-anchor="end" fill="#4a4540">0</text><text x="45" y="180" font-size="11" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">Latency</text><text x="45" y="195" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">(s)</text><rect x="100.0" y="-130.0" width="80" height="420.0" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="140" y="-136.0" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">0 s</text><text x="140" y="308" font-size="10" text-anchor="middle" fill="#4a4540">Control</text><text x="140" y="322" font-size="10" text-anchor="middle" fill="#4a4540">(water)</text><rect x="260.0" y="-410.0" width="80" height="700.0" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="300" y="-416.0" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">-40 s</text><text x="300" y="308" font-size="10" text-anchor="middle" fill="#4a4540">Sucrose</text><text x="300" y="322" font-size="10" text-anchor="middle" fill="#4a4540">surprise</text><rect x="420.0" y="-95.0" width="80" height="385.0" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="460" y="-101.0" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">5 s</text><text x="460" y="308" font-size="10" text-anchor="middle" fill="#4a4540">Sucrose +</text><text x="460" y="322" font-size="10" text-anchor="middle" fill="#4a4540">fluphenazine</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Dopamine antagonist abolishes the sucrose-surprise effect — the bias is dopamine-mediated, not water-deprivation.</text></svg>