<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Language acquisition — proto-conversation to recursive grammar</text><line x1="80" y1="220" x2="660" y2="220" stroke="#1a1714" stroke-width="1.2"/><line x1="80.0" y1="220" x2="80.0" y2="224" stroke="#8a8480" stroke-width="1"/><text x="80.0" y="238" font-size="9" text-anchor="middle" fill="#4a4540">0 mo</text><line x1="176.66666666666666" y1="220" x2="176.66666666666666" y2="224" stroke="#8a8480" stroke-width="1"/><text x="176.66666666666666" y="238" font-size="9" text-anchor="middle" fill="#4a4540">6 mo</text><line x1="273.3333333333333" y1="220" x2="273.3333333333333" y2="224" stroke="#8a8480" stroke-width="1"/><text x="273.3333333333333" y="238" font-size="9" text-anchor="middle" fill="#4a4540">12 mo</text><line x1="370.0" y1="220" x2="370.0" y2="224" stroke="#8a8480" stroke-width="1"/><text x="370.0" y="238" font-size="9" text-anchor="middle" fill="#4a4540">18 mo</text><line x1="466.66666666666663" y1="220" x2="466.66666666666663" y2="224" stroke="#8a8480" stroke-width="1"/><text x="466.66666666666663" y="238" font-size="9" text-anchor="middle" fill="#4a4540">24 mo</text><line x1="563.3333333333334" y1="220" x2="563.3333333333334" y2="224" stroke="#8a8480" stroke-width="1"/><text x="563.3333333333334" y="238" font-size="9" text-anchor="middle" fill="#4a4540">30 mo</text><line x1="660.0" y1="220" x2="660.0" y2="224" stroke="#8a8480" stroke-width="1"/><text x="660.0" y="238" font-size="9" text-anchor="middle" fill="#4a4540">36 mo</text><line x1="128.33333333333331" y1="100" x2="128.33333333333331" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="128.33333333333331" cy="100" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="128.33333333333331" y="92" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Proto-conversations</text><text x="128.33333333333331" y="114" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">dyad: face-to-face turn-taking</text><line x1="208.88888888888889" y1="80" x2="208.88888888888889" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="208.88888888888889" cy="80" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="208.88888888888889" y="72" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Gaze following</text><text x="208.88888888888889" y="94" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">infant tracks adult attention</text><line x1="273.3333333333333" y1="110" x2="273.3333333333333" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="273.3333333333333" cy="110" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="273.3333333333333" y="102" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Joint attention →
declarative pointing</text><text x="273.3333333333333" y="124" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">triad: I, you, that thing</text><line x1="273.3333333333333" y1="180" x2="273.3333333333333" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="273.3333333333333" cy="180" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="273.3333333333333" y="172" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">First words</text><text x="273.3333333333333" y="194" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">labeled categories</text><line x1="370.0" y1="100" x2="370.0" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="370.0" cy="100" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="370.0" y="92" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Vocabulary explosion</text><text x="370.0" y="114" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">30+ new words per week</text><line x1="418.33333333333337" y1="180" x2="418.33333333333337" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="418.33333333333337" cy="180" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="418.33333333333337" y="172" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Question forms</text><text x="418.33333333333337" y="194" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">asking for information</text><line x1="611.6666666666666" y1="110" x2="611.6666666666666" y2="220" stroke="#c8c4c0" stroke-width="0.6" stroke-dasharray="2,2"/><circle cx="611.6666666666666" cy="110" r="5" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="611.6666666666666" y="102" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Recursive grammar</text><text x="611.6666666666666" y="124" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">embedded clauses</text><text x="350" y="290" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">First two stages are dyadic. The shift to triadic joint attention (~9 mo) is the precursor of language.</text></svg>