<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Cataglyphis path integration — outward zigzag, homeward straight</text><rect x="50" y="60" width="600" height="240" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><circle cx="110" cy="130" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="122" y="124" font-size="10" font-weight="bold" font-style="italic" fill="#1a1714">nest</text><circle cx="550" cy="240" r="6" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="526" y="258" font-size="10" font-weight="bold" font-style="italic" fill="#1a1714">food</text><path d="M 110 130 L 160 100 L 220 150 L 280 110 L 330 175 L 380 130 L 440 200 L 480 170 L 520 220 L 550 240" fill="none" stroke="#4a4540" stroke-width="1.5"/><text x="330" y="80" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">outward (foraging zigzag)</text><line x1="550" y1="240" x2="110" y2="130" stroke="#1a1714" stroke-width="2.5"/><text x="330" y="200" font-size="10" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">homeward (vector)</text><line x1="380" y1="130" x2="350" y2="100" stroke="#c8c4c0" stroke-width="0.8" stroke-dasharray="3,3"/><circle cx="350" cy="100" r="5" fill="none" stroke="#1a1714" stroke-width="1"/><text x="330" y="95" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">termination after displacement</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Displaced ants walk the home vector from the displacement point — they do not correct.</text></svg>