<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="420" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Phylogenetic distribution of social-cognitive layers</text><text x="60" y="80" font-size="11" font-weight="bold" fill="#1a1714">1. Emotional contagion</text><rect x="310" y="66" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="353" y="80" font-size="9" text-anchor="middle" fill="#1a1714">all vertebrates ✓</text><text x="60" y="180" font-size="11" font-weight="bold" fill="#1a1714">2. Consolation / empathy</text><rect x="310" y="166" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="353" y="180" font-size="9" text-anchor="middle" fill="#1a1714">great apes ✓</text><rect x="400" y="166" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="443" y="180" font-size="9" text-anchor="middle" fill="#1a1714">canids ✓</text><rect x="490" y="166" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="533" y="180" font-size="9" text-anchor="middle" fill="#1a1714">elephants ✓</text><rect x="580" y="166" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="623" y="180" font-size="9" text-anchor="middle" fill="#1a1714">corvids ✓</text><text x="60" y="280" font-size="11" font-weight="bold" fill="#1a1714">3. Perceptual perspective-taking</text><rect x="310" y="266" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="353" y="280" font-size="9" text-anchor="middle" fill="#1a1714">great apes ✓</text><rect x="400" y="266" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="443" y="280" font-size="9" text-anchor="middle" fill="#1a1714">corvids ✓</text><text x="60" y="340" font-size="11" font-weight="bold" fill="#1a1714">4. False-belief attribution</text><rect x="310" y="326" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="353" y="340" font-size="9" text-anchor="middle" fill="#1a1714">great apes (implicit only)</text><rect x="400" y="326" width="86" height="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="443" y="340" font-size="9" text-anchor="middle" fill="#1a1714">human children @ 4 yrs</text><text x="350" y="390" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Each higher layer is a strict subset of the lower. Macaques are the conspicuous gap at layer 2.</text></svg>