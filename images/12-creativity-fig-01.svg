<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">New Caledonian crow tools — sequential modification of raw materials</text><text x="180" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Hooked twig (from forked branch)</text><rect x="60" y="80" width="240" height="200" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="180" y="105" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">raw material:</text><path d="M 100 130 L 200 130 L 215 145 L 240 165" fill="none" stroke="#1a1714" stroke-width="2"/><line x1="200" y1="130" x2="240" y2="100" stroke="#1a1714" stroke-width="2"/><text x="180" y="195" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">modifications:</text><text x="70" y="215" font-size="10" fill="#1a1714">1. break at fork  2. shorten side  3. retain hook</text><text x="180" y="250" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">final tool: ↪ hook</text><text x="520" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Stepped pandanus strip</text><rect x="400" y="80" width="240" height="200" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="105" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">raw material: pandanus leaf with barbs</text><path d="M 430 140 L 430 140 L 454 140 L 454 136 L 478 136 L 478 132 L 502 132 L 502 128 L 526 128 L 526 124 L 550 124 L 550 120 L 574 120 L 574 116 L 598 116 L 598 112 L 622 112 " fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="430" y1="140" x2="434" y2="132" stroke="#1a1714" stroke-width="1"/><line x1="460" y1="136" x2="464" y2="128" stroke="#1a1714" stroke-width="1"/><line x1="490" y1="132" x2="494" y2="124" stroke="#1a1714" stroke-width="1"/><line x1="520" y1="128" x2="524" y2="120" stroke="#1a1714" stroke-width="1"/><line x1="550" y1="120" x2="554" y2="112" stroke="#1a1714" stroke-width="1"/><line x1="580" y1="116" x2="584" y2="108" stroke="#1a1714" stroke-width="1"/><text x="520" y="200" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">modifications:</text><text x="410" y="220" font-size="10" fill="#1a1714">1. cut along grain  2. step the cut  3. preserve barbs</text><text x="520" y="250" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">final tool: standardized barbed strip</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Both tools require sequential form imposition — not selection from available objects.</text></svg>