<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">The Sally-Anne false-belief task</text><text x="130" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">1. Sally hides marble</text><rect x="40" y="75" width="180" height="180" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><rect x="70" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="85" y="245" font-size="9" text-anchor="middle" fill="#4a4540">basket</text><rect x="160" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="175" y="245" font-size="9" text-anchor="middle" fill="#4a4540">box</text><circle cx="80" cy="110" r="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><text x="80" y="114" font-size="9" text-anchor="middle" font-weight="bold" fill="#f5f2ee">Sa</text><circle cx="170" cy="110" r="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="170" y="114" font-size="9" text-anchor="middle" font-weight="bold" fill="#1a1714">An</text><circle cx="85" cy="215" r="4" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><line x1="80" y1="124" x2="80" y2="195" stroke="#1a1714" stroke-width="0.7" marker-end="url(#arrow)"/><text x="350" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">2. Sally leaves; Anne moves</text><rect x="260" y="75" width="180" height="180" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><rect x="290" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="305" y="245" font-size="9" text-anchor="middle" fill="#4a4540">basket</text><rect x="380" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="395" y="245" font-size="9" text-anchor="middle" fill="#4a4540">box</text><text x="300" y="114" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(Sally</text><text x="300" y="126" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540"> away)</text><circle cx="390" cy="110" r="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="390" y="114" font-size="9" text-anchor="middle" font-weight="bold" fill="#1a1714">An</text><circle cx="395" cy="215" r="4" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><line x1="315" y1="215" x2="380" y2="215" stroke="#4a4540" stroke-width="1.2" marker-end="url(#arrow)"/><text x="570" y="60" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">3. Sally returns</text><rect x="480" y="75" width="180" height="180" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><rect x="510" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="525" y="245" font-size="9" text-anchor="middle" fill="#4a4540">basket</text><rect x="600" y="200" width="30" height="30" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="615" y="245" font-size="9" text-anchor="middle" fill="#4a4540">box</text><circle cx="520" cy="110" r="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/><text x="520" y="114" font-size="9" text-anchor="middle" font-weight="bold" fill="#f5f2ee">Sa</text><text x="520" y="130" font-size="8" text-anchor="middle" font-style="italic" fill="#4a4540">(returning)</text><circle cx="615" cy="215" r="4" fill="#1a1714" stroke="#1a1714" stroke-width="1"/><text x="520" y="95" font-size="18" text-anchor="middle" font-weight="bold" fill="#1a1714">?</text><line x1="520" y1="130" x2="525" y2="195" stroke="#1a1714" stroke-width="1.2" marker-end="url(#arrow)"/><text x="495" y="175" font-size="9" font-weight="bold" font-style="italic" fill="#1a1714">false-belief</text><text x="495" y="187" font-size="9" font-style="italic" fill="#4a4540">answer (basket)</text><line x1="534" y1="130" x2="610" y2="195" stroke="#c8c4c0" stroke-width="0.8" marker-end="url(#arrow)"/><text x="600" y="165" font-size="9" font-style="italic" fill="#c8c4c0">wrong</text><text x="350" y="305" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Correct answer = where Sally BELIEVES it is, not where it is. Tests representation of belief-as-belief.</text></svg>