<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="420" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Decision tree — interpreting a mirror-test failure</text><rect x="260" y="60" width="180" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="350" y="82" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Species fails mark test</text><line x1="350" y1="96" x2="350" y2="130" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="260" y="130" width="180" height="36" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="350" y="152" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Was the test visual-only?</text><line x1="350" y1="166" x2="200" y2="200" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="80" y="200" width="240" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="200" y="220" font-size="10" text-anchor="middle" fill="#1a1714">Sensory mismatch possible —</text><text x="200" y="234" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">test olfactory/tactile analog</text><text x="180" y="192" font-size="9" text-anchor="end" font-style="italic" fill="#4a4540">yes</text><line x1="350" y1="166" x2="500" y2="200" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="380" y="200" width="240" height="36" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="500" y="222" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Did animal show social response</text><text x="500" y="236" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">to reflection?</text><text x="370" y="192" font-size="9" font-style="italic" fill="#4a4540">no</text><line x1="500" y1="236" x2="200" y2="290" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="80" y="290" width="240" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="200" y="310" font-size="10" text-anchor="middle" fill="#1a1714">Social inhibition possible —</text><text x="200" y="324" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">check gaze-aversion norms</text><text x="220" y="285" font-size="9" text-anchor="end" font-style="italic" fill="#4a4540">yes</text><line x1="500" y1="236" x2="500" y2="290" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="380" y="290" width="240" height="36" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="500" y="312" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Did animal attend to mark?</text><text x="490" y="285" font-size="9" font-style="italic" fill="#4a4540">no</text><line x1="500" y1="326" x2="350" y2="360" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="220" y="360" width="260" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="350" y="380" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Genuine absence of body-self?</text><text x="350" y="394" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(the strongest negative interpretation)</text></svg>