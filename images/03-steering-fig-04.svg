<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="480" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Steering — six-component architecture as a causal stack</text><rect x="140" y="60" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="77" font-size="11" font-weight="bold" fill="#1a1714">1. Bilateral body plan</text><text x="150" y="92" font-size="10" font-style="italic" fill="#4a4540">constrains decision to forward / turn</text><rect x="140" y="115" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="132" font-size="11" font-weight="bold" fill="#1a1714">2. Labeled-line sensors</text><text x="150" y="147" font-size="10" font-style="italic" fill="#4a4540">each input carries its valence structurally</text><rect x="140" y="170" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="187" font-size="11" font-weight="bold" fill="#1a1714">3. Integration  (AIY)</text><text x="150" y="202" font-size="10" font-style="italic" fill="#4a4540">weights inputs, computes decision</text><rect x="140" y="225" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="242" font-size="11" font-weight="bold" fill="#1a1714">4. Temporal comparison</text><text x="150" y="257" font-size="10" font-style="italic" fill="#4a4540">drives the pirouette rule (dC/dt)</text><rect x="140" y="280" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="297" font-size="11" font-weight="bold" fill="#1a1714">5. Mutual inhibition</text><text x="150" y="312" font-size="10" font-style="italic" fill="#4a4540">enforces coherent motor output</text><rect x="140" y="335" width="420" height="38" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="150" y="352" font-size="11" font-weight="bold" fill="#1a1714">6. Associative plasticity</text><text x="150" y="367" font-size="10" font-style="italic" fill="#4a4540">weights update with experience</text><line x1="350" y1="100" x2="350" y2="114" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="350" y1="155" x2="350" y2="169" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="350" y1="210" x2="350" y2="224" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="350" y1="265" x2="350" y2="279" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="350" y1="320" x2="350" y2="334" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 50 70 Q 50 220, 50 380 Q 50 410, 580 410 Q 620 410, 620 240 Q 620 60, 350 60" fill="none" stroke="#1a1714" stroke-width="1.2" stroke-dasharray="6,4"/><text x="610" y="240" font-size="11" text-anchor="end" font-weight="bold" font-style="italic" fill="#1a1714">Neuromodulatory state</text><text x="610" y="256" font-size="10" text-anchor="end" font-style="italic" fill="#4a4540">(fed/starved, etc.) wraps</text><text x="610" y="270" font-size="10" text-anchor="end" font-style="italic" fill="#4a4540">the entire stack as context</text><path d="M 350 380 Q 90 380, 90 130" fill="none" stroke="#1a1714" stroke-width="1.2" stroke-dasharray="6,4"/><line x1="91" y1="132" x2="91" y2="119" stroke="#1a1714" stroke-width="1.2" marker-end="url(#arrow)"/><text x="110" y="420" font-size="10" font-style="italic" fill="#4a4540">associative plasticity feeds back to update the labeled-line weights</text></svg>