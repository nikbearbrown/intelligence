<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Short-term vs. long-term sensitization in Aplysia</text><text x="180" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Short-term  (minutes–hours)</text><text x="180" y="76" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">no new protein synthesis</text><text x="520" y="60" font-size="12" text-anchor="middle" font-weight="bold" fill="#1a1714">Long-term  (days–weeks)</text><text x="520" y="76" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">CREB-1 → new synaptic growth</text><path d="M 80 130 Q 180 110, 280 130" fill="none" stroke="#1a1714" stroke-width="1.5"/><text x="180" y="145" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">membrane</text><text x="180" y="160" font-size="10" text-anchor="middle" fill="#1a1714">5-HT receptor</text><text x="180" y="190" font-size="10" text-anchor="middle" fill="#1a1714">cAMP ↑</text><text x="180" y="220" font-size="10" text-anchor="middle" fill="#1a1714">PKA active</text><text x="180" y="250" font-size="10" text-anchor="middle" fill="#1a1714">K⁺ channel closed</text><line x1="180" y1="165" x2="180" y2="175" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="180" y1="195" x2="180" y2="205" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="180" y1="225" x2="180" y2="235" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="180" y="285" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">transient: synaptic terminal</text><text x="180" y="298" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">stays sensitized while PKA active</text><path d="M 420 130 Q 520 110, 620 130" fill="none" stroke="#1a1714" stroke-width="1.5"/><text x="520" y="145" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">membrane</text><text x="520" y="160" font-size="10" text-anchor="middle" fill="#1a1714">5-HT receptor</text><text x="520" y="180" font-size="10" text-anchor="middle" fill="#1a1714">cAMP ↑</text><text x="520" y="200" font-size="10" text-anchor="middle" fill="#1a1714">PKA → nucleus</text><line x1="520" y1="165" x2="520" y2="175" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="520" y1="185" x2="520" y2="195" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><ellipse cx="520" cy="245" rx="90" ry="35" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="520" y="230" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">nucleus</text><text x="520" y="248" font-size="10" text-anchor="middle" fill="#1a1714">CREB-2 displaced</text><text x="520" y="263" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">CREB-1 binds DNA</text><line x1="520" y1="280" x2="520" y2="295" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="520" y="308" font-size="10" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">new synaptic terminals grow</text><text x="520" y="322" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">(persistent, structural change)</text></svg>