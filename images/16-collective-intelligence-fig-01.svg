<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Three mechanisms of collective intelligence</text><line x1="80" y1="280" x2="660" y2="280" stroke="#8a8480" stroke-width="1"/><line x1="80" y1="80" x2="80" y2="280" stroke="#8a8480" stroke-width="1"/><text x="35" y="180" font-size="11" text-anchor="middle" font-weight="bold" font-style="italic" fill="#1a1714">generational</text><text x="35" y="195" font-size="10" text-anchor="middle" font-style="italic" fill="#1a1714">improvement</text><rect x="50" y="270" width="180" height="10" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="140" y="264" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Aggregation</text><text x="140" y="288" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(Galton's ox; any independent estimators)</text><text x="140" y="298" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">flat — no improvement</text><rect x="260" y="240" width="180" height="40" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="350" y="234" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Coordination</text><text x="350" y="258" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(murmurations, fish schools, bee foraging)</text><text x="350" y="298" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">flat — same task each generation</text><rect x="470" y="110" width="180" height="170" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="560" y="104" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Cumulative culture</text><text x="560" y="128" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(humans only — documented ratcheting)</text><text x="560" y="298" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">logarithmic — knowledge accumulates</text><text x="350" y="330" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">The third mechanism is the ratchet. The first two are real but bounded — they don't accumulate.</text></svg>