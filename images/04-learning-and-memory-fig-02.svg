<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Aplysia gill-withdrawal — sensitization circuit</text><circle cx="120" cy="200" r="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="120" y="196" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Siphon</text><text x="120" y="210" font-size="10" text-anchor="middle" fill="#1a1714">SN</text><line x1="142" y1="200" x2="290" y2="200" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><text x="216" y="188" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">glutamate</text><circle cx="310" cy="200" r="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="310" y="196" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Motor</text><text x="310" y="210" font-size="10" text-anchor="middle" fill="#1a1714">neuron</text><line x1="332" y1="200" x2="480" y2="200" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="490" y="175" width="90" height="50" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="535" y="195" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Gill</text><text x="535" y="210" font-size="9" text-anchor="middle" font-style="italic" fill="#4a4540">(withdraw)</text><circle cx="120" cy="90" r="22" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/><text x="120" y="86" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">Tail</text><text x="120" y="100" font-size="10" text-anchor="middle" fill="#1a1714">SN</text><line x1="142" y1="90" x2="240" y2="90" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/><circle cx="265" cy="90" r="22" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/><text x="265" y="86" font-size="10" text-anchor="middle" font-weight="bold" fill="#1a1714">5-HT</text><text x="265" y="100" font-size="10" text-anchor="middle" fill="#1a1714">IN</text><path d="M 265 112 Q 220 150, 175 195" fill="none" stroke="#1a1714" stroke-width="1.5"/><line x1="178" y1="196" x2="165" y2="196" stroke="#1a1714" stroke-width="1.2" marker-end="url(#arrow)"/><text x="195" y="145" font-size="10" font-weight="bold" font-style="italic" fill="#4a4540">serotonin</text><text x="195" y="158" font-size="9" font-style="italic" fill="#4a4540">(modulates SN→motor synapse)</text><text x="350" y="320" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Tail shock recruits 5-HT IN, which strengthens the existing siphon→motor pathway from the side.</text></svg>