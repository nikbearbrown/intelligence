<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714"><defs>  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>  </marker>  <marker id="arrowL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">    <polygon points="0 0, 10 4, 0 8" fill="#1a1714"/>  </marker></defs><rect width="700" height="360" fill="#fdfcfb"/><text x="350" y="22" font-size="13" text-anchor="middle" font-weight="bold" fill="#1a1714">Major intelligence definitions, 1905–2019</text><line x1="60" y1="230" x2="640" y2="230" stroke="#8a8480" stroke-width="1"/><line x1="60.0" y1="226" x2="60.0" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="60.0" y="248" font-size="9" text-anchor="middle" fill="#4a4540">1900</text><line x1="108.33333333333333" y1="226" x2="108.33333333333333" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="156.66666666666666" y1="226" x2="156.66666666666666" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="156.66666666666666" y="248" font-size="9" text-anchor="middle" fill="#4a4540">1920</text><line x1="205.0" y1="226" x2="205.0" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="253.33333333333331" y1="226" x2="253.33333333333331" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="253.33333333333331" y="248" font-size="9" text-anchor="middle" fill="#4a4540">1940</text><line x1="301.6666666666667" y1="226" x2="301.6666666666667" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="350.0" y1="226" x2="350.0" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="350.0" y="248" font-size="9" text-anchor="middle" fill="#4a4540">1960</text><line x1="398.33333333333337" y1="226" x2="398.33333333333337" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="446.66666666666663" y1="226" x2="446.66666666666663" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="446.66666666666663" y="248" font-size="9" text-anchor="middle" fill="#4a4540">1980</text><line x1="495.0" y1="226" x2="495.0" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="543.3333333333334" y1="226" x2="543.3333333333334" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="543.3333333333334" y="248" font-size="9" text-anchor="middle" fill="#4a4540">2000</text><line x1="591.6666666666666" y1="226" x2="591.6666666666666" y2="234" stroke="#8a8480" stroke-width="0.7"/><line x1="640.0" y1="226" x2="640.0" y2="234" stroke="#8a8480" stroke-width="0.7"/><text x="640.0" y="248" font-size="9" text-anchor="middle" fill="#4a4540">2020</text><line x1="84.16666666666666" y1="230" x2="84.16666666666666" y2="214" stroke="#1a1714" stroke-width="0.8"/><text x="84.16666666666666" y="160" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Binet</text><text x="84.16666666666666" y="174" font-size="9" text-anchor="middle" fill="#4a4540">(1905)</text><text x="84.16666666666666" y="188" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">judgment, auto-critique</text><text x="84.16666666666666" y="204" font-size="9" text-anchor="middle" fill="#4a4540">→ clinical triage</text><line x1="272.66666666666663" y1="230" x2="272.66666666666663" y2="256" stroke="#1a1714" stroke-width="0.8"/><text x="272.66666666666663" y="272" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Wechsler</text><text x="272.66666666666663" y="286" font-size="9" text-anchor="middle" fill="#4a4540">(1944)</text><text x="272.66666666666663" y="300" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">aggregate adaptive capacity</text><text x="272.66666666666663" y="316" font-size="9" text-anchor="middle" fill="#4a4540">→ psychometric measurement</text><line x1="461.1666666666667" y1="230" x2="461.1666666666667" y2="214" stroke="#1a1714" stroke-width="0.8"/><text x="461.1666666666667" y="160" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Gardner</text><text x="461.1666666666667" y="174" font-size="9" text-anchor="middle" fill="#4a4540">(1983)</text><text x="461.1666666666667" y="188" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">multiple intelligences</text><text x="461.1666666666667" y="204" font-size="9" text-anchor="middle" fill="#4a4540">→ educational profiling</text><line x1="470.83333333333337" y1="230" x2="470.83333333333337" y2="256" stroke="#1a1714" stroke-width="0.8"/><text x="470.83333333333337" y="272" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Sternberg</text><text x="470.83333333333337" y="286" font-size="9" text-anchor="middle" fill="#4a4540">(1985)</text><text x="470.83333333333337" y="300" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">analytic + creative + practical</text><text x="470.83333333333337" y="316" font-size="9" text-anchor="middle" fill="#4a4540">→ cognitive theory</text><line x1="577.1666666666667" y1="230" x2="577.1666666666667" y2="214" stroke="#1a1714" stroke-width="0.8"/><text x="577.1666666666667" y="160" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Legg–Hutter</text><text x="577.1666666666667" y="174" font-size="9" text-anchor="middle" fill="#4a4540">(2007)</text><text x="577.1666666666667" y="188" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">goals across environments</text><text x="577.1666666666667" y="204" font-size="9" text-anchor="middle" fill="#4a4540">→ computational AI</text><line x1="635.1666666666666" y1="230" x2="635.1666666666666" y2="256" stroke="#1a1714" stroke-width="0.8"/><text x="635.1666666666666" y="272" font-size="11" text-anchor="middle" font-weight="bold" fill="#1a1714">Chollet</text><text x="635.1666666666666" y="286" font-size="9" text-anchor="middle" fill="#4a4540">(2019)</text><text x="635.1666666666666" y="300" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">skill-acquisition efficiency</text><text x="635.1666666666666" y="316" font-size="9" text-anchor="middle" fill="#4a4540">→ AI evaluation</text><text x="350" y="340" font-size="10" text-anchor="middle" font-style="italic" fill="#4a4540">Each definition was built for a real purpose. The history is one of accumulation, not convergence.</text></svg>